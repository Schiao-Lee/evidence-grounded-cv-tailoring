name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements-dev.txt
      - name: Privacy scan (must be clean)
        run: python tools/redact_scan.py
      - name: Unit tests
        run: pytest -q
      - name: Syntax check
        run: python -m py_compile tools/*.py
