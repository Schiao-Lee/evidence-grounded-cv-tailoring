<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<!-- Source for og-image.png (1200x630). Regenerate with headless Chrome:
     chrome --headless=new --window-size=1200,630 --screenshot=og-image.png og-card.html -->
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(145deg, #122c47 0%, #1F4E79 58%, #2f6aa3 100%);
    color: #fff;
    padding: 70px 76px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .top { }
  .eyebrow {
    text-transform: uppercase;
    letter-spacing: 4px;
    font-size: 20px;
    font-weight: 700;
    opacity: 0.72;
    margin-bottom: 26px;
  }
  h1 {
    font-size: 72px;
    line-height: 1.05;
    font-weight: 800;
    letter-spacing: -1.5px;
    max-width: 1000px;
  }
  h1 em { font-style: italic; color: #ffd98a; }
  .tagline {
    font-size: 33px;
    font-weight: 400;
    opacity: 0.95;
    margin-top: 26px;
    max-width: 940px;
    line-height: 1.3;
  }
  .tagline b { color: #ffd98a; font-weight: 700; }
  .bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .chips { font-size: 22px; opacity: 0.9; }
  .chips span {
    display: inline-block;
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 999px;
    padding: 8px 18px;
    margin-right: 12px;
  }
  .url {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 22px;
    opacity: 0.85;
    text-align: right;
  }
  .url .big { display: block; font-size: 26px; font-weight: 700; opacity: 1; }
</style>
</head>
<body>
  <div class="top">
    <div class="eyebrow">Open source · MIT · human-in-the-loop</div>
    <h1>An AI résumé workflow<br />designed so it <em>can't</em> fabricate.</h1>
    <div class="tagline">
      Every line true and traceable. Missing requirements become an honest
      <b>gap</b> — never a made-up bullet.
    </div>
  </div>
  <div class="bottom">
    <div class="chips">
      <span>Subset &amp; gap rules</span>
      <span>13 QA gates</span>
      <span>LaTeX</span>
    </div>
    <div class="url">
      <span class="big">evidence-grounded-cv-tailoring</span>
      github.com/Schiao-Lee
    </div>
  </div>
</body>
</html>
